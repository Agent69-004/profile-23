    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0b1a0e;
            background-image: radial-gradient(circle at 50% 30%, rgba(0, 230, 118, 0.06) 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e8f5e9;
            text-align: center;
            flex-direction: column;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
        }

        /* ----- THE ONE BUTTON (Massive, Glowing) ----- */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 24px 48px;
            background: linear-gradient(135deg, #00e676 0%, #00b85c 100%);
            color: #051008;
            font-weight: 900;
            font-size: 1.8rem;
            border: none;
            border-radius: 80px;
            cursor: pointer;
            box-shadow: 0 8px 50px rgba(0, 230, 118, 0.4), inset 0 2px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
            text-shadow: 0 1px 3px rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 440px;
            position: relative;
            letter-spacing: -0.5px;
            touch-action: manipulation;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, transparent 60%);
            transform: rotate(25deg) translateY(-10%);
            pointer-events: none;
        }

        .btn-primary:hover {
            transform: scale(1.03) translateY(-3px);
            box-shadow: 0 16px 60px rgba(0, 230, 118, 0.6), inset 0 2px 0 rgba(255, 255, 255, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.95) translateY(0);
            box-shadow: 0 4px 30px rgba(0, 230, 118, 0.3);
        }

        .btn-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            width: 100%;
            margin: 30px 0;
        }

        .btn-wrapper::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120%;
            height: 160%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(0, 230, 118, 0.20) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse-ring 2.8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
        }

        .hero-emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #b2dfb8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 .gold {
            background: linear-gradient(135deg, #ffd700, #f5b342);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sub {

            color: #9bb8a8;
            margin: 12px 0 6px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .footer-note {

            font-size: 0.65rem;
            color: #3a5a4a;
        }
        .footer-note a {
            color: #5a8a6a;
            text-decoration: none;
        }
        .footer-note a:hover {
            color: #8bcba0;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .btn-primary { font-size: 1.4rem; padding: 20px 32px; gap: 12px; }
            .hero-emoji { font-size: 3rem; }
            .sub { font-size: 0.95rem; }
        }
        @media (max-width: 400px) {
            h1 { font-size: 1.6rem; }
            .btn-primary { font-size: 1.1rem; padding: 16px 24px; }
        }
